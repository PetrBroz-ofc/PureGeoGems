<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureGeoGems — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white:#fffaf8; --blush:#f9e8e4; --rose:#f0c4ba;
  --dusty:#e8a898; --deep:#c97b6e; --text:#3d2a26; --light:#8a6460;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Jost',sans-serif; background:#f5f0ee; color:var(--text); }

/* ── LOGIN ── */
#loginScreen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--blush) 0%, var(--white) 100%);
}
.login-box {
  background:white; border-radius:24px; padding:48px 40px; width:100%; max-width:420px;
  box-shadow:0 20px 60px rgba(201,123,110,.15);
}
.login-logo { font-family:'Cormorant Garamond',serif; font-size:2rem; text-align:center; margin-bottom:8px; }
.login-logo span { color:var(--deep); }
.login-sub { text-align:center; font-size:.8rem; color:var(--light); letter-spacing:.1em; text-transform:uppercase; margin-bottom:36px; }
.login-box label { display:block; font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; color:var(--light); margin-bottom:6px; margin-top:20px; }
.login-box input { width:100%; padding:12px 16px; border:1px solid var(--rose); border-radius:12px; font-family:'Jost',sans-serif; font-size:.9rem; outline:none; transition:border .2s; }
.login-box input:focus { border-color:var(--deep); }
.login-btn { width:100%; margin-top:28px; background:var(--deep); color:white; border:none; padding:14px; border-radius:100px; font-family:'Jost',sans-serif; font-size:.8rem; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; transition:background .2s; }
.login-btn:hover { background:var(--text); }
.login-error { color:#e05555; font-size:.82rem; text-align:center; margin-top:14px; display:none; }

/* ── ADMIN LAYOUT ── */
#adminScreen { display:none; min-height:100vh; }
.admin-nav {
  background:var(--text); padding:0 32px; display:flex; align-items:center;
  justify-content:space-between; height:64px; position:sticky; top:0; z-index:10;
}
.admin-nav-logo { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:white; }
.admin-nav-logo span { color:var(--rose); }
.admin-nav-right { display:flex; align-items:center; gap:16px; }
.admin-nav-user { font-size:.78rem; color:rgba(255,255,255,.6); }
.admin-logout { background:none; border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.7); padding:7px 16px; border-radius:100px; cursor:pointer; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; transition:all .2s; }
.admin-logout:hover { background:rgba(255,255,255,.1); }

.admin-body { padding:40px 32px; max-width:1100px; margin:0 auto; }

/* ── STATS ── */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:40px; }
.stat-card { background:white; border-radius:16px; padding:24px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.05); }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:2.8rem; font-weight:300; color:var(--deep); }
.stat-label { font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; color:var(--light); margin-top:4px; }

/* ── TOOLBAR ── */
.toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.toolbar h2 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; }
.btn-add { background:var(--deep); color:white; border:none; padding:11px 24px; border-radius:100px; font-family:'Jost',sans-serif; font-size:.76rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:background .2s; }
.btn-add:hover { background:var(--text); }

/* ── PRODUCT TABLE ── */
.products-table { background:white; border-radius:16px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.05); }
.table-header { display:grid; grid-template-columns:60px 1fr 100px 120px 100px 120px; padding:14px 20px; background:var(--blush); font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--light); }
.table-row { display:grid; grid-template-columns:60px 1fr 100px 120px 100px 120px; padding:16px 20px; border-bottom:1px solid var(--blush); align-items:center; transition:background .15s; }
.table-row:last-child { border-bottom:none; }
.table-row:hover { background:var(--white); }
.table-img { width:44px; height:44px; border-radius:10px; object-fit:cover; }
.table-name { font-weight:500; font-size:.9rem; }
.table-material { font-size:.75rem; color:var(--light); margin-top:2px; }
.table-price { font-weight:600; color:var(--deep); }
.cat-badge { display:inline-block; background:var(--blush); color:var(--deep); font-size:.65rem; letter-spacing:.08em; padding:3px 10px; border-radius:100px; text-transform:uppercase; }
.stock-badge { display:inline-block; font-size:.7rem; padding:3px 10px; border-radius:100px; }
.stock-yes { background:#e8f5e9; color:#388e3c; }
.stock-no { background:#fce4ec; color:#c62828; }
.row-actions { display:flex; gap:8px; }
.btn-edit { background:var(--blush); color:var(--deep); border:none; padding:6px 14px; border-radius:100px; cursor:pointer; font-size:.72rem; transition:all .2s; }
.btn-edit:hover { background:var(--rose); }
.btn-delete { background:#fce4ec; color:#c62828; border:none; padding:6px 14px; border-radius:100px; cursor:pointer; font-size:.72rem; transition:all .2s; }
.btn-delete:hover { background:#f8bbd0; }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .25s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-box { background:white; border-radius:20px; width:100%; max-width:580px; max-height:90vh; overflow-y:auto; padding:36px; position:relative; }
.modal-title { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; margin-bottom:28px; }
.modal-close { position:absolute; top:16px; right:16px; background:var(--blush); border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:1rem; transition:background .2s; }
.modal-close:hover { background:var(--rose); }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--light); }
.form-group input, .form-group select, .form-group textarea {
  padding:10px 14px; border:1px solid var(--rose); border-radius:10px;
  font-family:'Jost',sans-serif; font-size:.88rem; outline:none; transition:border .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--deep); }
.form-group textarea { resize:vertical; min-height:80px; }
.img-preview { width:100%; height:160px; border-radius:12px; object-fit:cover; margin-top:8px; display:none; }
.modal-actions { display:flex; gap:12px; margin-top:28px; justify-content:flex-end; }
.btn-cancel { background:var(--blush); color:var(--text); border:none; padding:11px 24px; border-radius:100px; cursor:pointer; font-size:.76rem; letter-spacing:.1em; text-transform:uppercase; }
.btn-save { background:var(--deep); color:white; border:none; padding:11px 28px; border-radius:100px; cursor:pointer; font-size:.76rem; letter-spacing:.1em; text-transform:uppercase; transition:background .2s; }
.btn-save:hover { background:var(--text); }

/* ── TOAST ── */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:white; padding:12px 24px; border-radius:100px; font-size:.82rem; opacity:0; transition:all .3s; pointer-events:none; z-index:200; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── EMPTY ── */
.empty { text-align:center; padding:60px 20px; color:var(--light); }
.empty-icon { font-size:3rem; margin-bottom:16px; }

/* ── LOADING ── */
.loading { text-align:center; padding:40px; color:var(--light); font-size:.9rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Pure<span>Geo</span>Gems</div>
    <p class="login-sub">Admin panel</p>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="vas@email.cz"/>
    <label>Heslo</label>
    <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Přihlásit se</button>
    <p class="login-error" id="loginError">Špatný email nebo heslo.</p>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <nav class="admin-nav">
    <div class="admin-nav-logo">Pure<span>Geo</span>Gems <span style="font-family:Jost;font-size:.75rem;color:rgba(255,255,255,.4);margin-left:8px;">Admin</span></div>
    <div class="admin-nav-right">
      <span class="admin-nav-user" id="adminUserEmail"></span>
      <button class="admin-logout" onclick="doLogout()">Odhlásit</button>
    </div>
  </nav>

  <div class="admin-body">
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">—</div>
        <div class="stat-label">Produktů celkem</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statInStock">—</div>
        <div class="stat-label">Skladem</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statCategories">—</div>
        <div class="stat-label">Kategorií</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <h2>Správa produktů</h2>
      <button class="btn-add" onclick="openModal()">+ Přidat produkt</button>
    </div>

    <!-- Table -->
    <div class="products-table">
      <div class="table-header">
        <div>Foto</div>
        <div>Název</div>
        <div>Cena</div>
        <div>Kategorie</div>
        <div>Sklad</div>
        <div>Akce</div>
      </div>
      <div id="productsList"><div class="loading">Načítám produkty...</div></div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">Nový produkt</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Název produktu</label>
        <input type="text" id="fName" placeholder="např. Levandulový náramek"/>
      </div>
      <div class="form-group">
        <label>Cena (Kč)</label>
        <input type="number" id="fPrice" placeholder="249"/>
      </div>
      <div class="form-group">
        <label>Kategorie</label>
        <select id="fCat">
          <option value="naramky">Náramky</option>
          <option value="nausnice">Náušnice</option>
          <option value="darcekove">Dárkové sety</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Materiál / popis pod názvem</label>
        <input type="text" id="fMaterial" placeholder="např. Fialové perly · na míru"/>
      </div>
      <div class="form-group full">
        <label>Popis</label>
        <textarea id="fDesc" placeholder="Krátký popis produktu..."></textarea>
      </div>
      <div class="form-group full">
        <label>URL fotky</label>
        <input type="url" id="fImg" placeholder="https://images.unsplash.com/..." oninput="previewImg()"/>
        <img id="imgPreview" class="img-preview"/>
      </div>
      <div class="form-group">
        <label>Badge (nepovinné)</label>
        <input type="text" id="fBadge" placeholder="např. Nové, Bestseller"/>
      </div>
      <div class="form-group">
        <label>Skladem</label>
        <select id="fStock">
          <option value="true">Ano — skladem</option>
          <option value="false">Ne — vyprodáno</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Zrušit</button>
      <button class="btn-save" onclick="saveProduct()">Uložit produkt</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.6.0/firebase-auth.js';
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, orderBy, query } from 'https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore.js';

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyAc0Li_NsLb2NY5zCEU5ONLCMw6fCnEl7o",
  authDomain: "puregeo-gems.firebaseapp.com",
  projectId: "puregeo-gems",
  storageBucket: "puregeo-gems.firebasestorage.app",
  messagingSenderId: "141896986437",
  appId: "1:141896986437:web:36883ca8e8f277b432582c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let products = [];
let editingId = null;

// ── AUTH ──
window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.style.display = 'block';
  }
};

window.doLogout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    document.getElementById('adminUserEmail').textContent = user.email;
    loadProducts();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').style.display = 'none';
  }
});

// ── LOAD PRODUCTS ──
async function loadProducts() {
  const list = document.getElementById('productsList');
  list.innerHTML = '<div class="loading">Načítám produkty...</div>';
  try {
    const q = query(collection(db, 'products'), orderBy('name'));
    const snap = await getDocs(q);
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProducts();
    updateStats();
  } catch(e) {
    // Pokud není index, načti bez řazení
    const snap = await getDocs(collection(db, 'products'));
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProducts();
    updateStats();
  }
}

function renderProducts() {
  const list = document.getElementById('productsList');
  if (products.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">💎</div><p>Žádné produkty. Přidej první!</p></div>';
    return;
  }
  list.innerHTML = products.map(p => `
    <div class="table-row">
      <div><img class="table-img" src="${p.img || 'https://images.unsplash.com/photo-1573408301185-9519f94815e5?w=100&q=60'}" onerror="this.src='https://images.unsplash.com/photo-1573408301185-9519f94815e5?w=100&q=60'"/></div>
      <div>
        <div class="table-name">${p.name}</div>
        <div class="table-material">${p.material || ''}</div>
      </div>
      <div class="table-price">${p.price} Kč</div>
      <div><span class="cat-badge">${catLabel(p.cat)}</span></div>
      <div><span class="stock-badge ${p.inStock !== false ? 'stock-yes' : 'stock-no'}">${p.inStock !== false ? 'Skladem' : 'Vyprodáno'}</span></div>
      <div class="row-actions">
        <button class="btn-edit" onclick="openModal('${p.id}')">Upravit</button>
        <button class="btn-delete" onclick="deleteProduct('${p.id}')">Smazat</button>
      </div>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('statTotal').textContent = products.length;
  document.getElementById('statInStock').textContent = products.filter(p => p.inStock !== false).length;
  const cats = new Set(products.map(p => p.cat)).size;
  document.getElementById('statCategories').textContent = cats || 0;
}

function catLabel(cat) {
  return cat === 'naramky' ? 'Náramky' : cat === 'nausnice' ? 'Náušnice' : cat === 'darcekove' ? 'Dárky' : cat || '—';
}

// ── MODAL ──
window.openModal = (id = null) => {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'Upravit produkt' : 'Nový produkt';

  if (id) {
    const p = products.find(x => x.id === id);
    document.getElementById('fName').value = p.name || '';
    document.getElementById('fPrice').value = p.price || '';
    document.getElementById('fCat').value = p.cat || 'naramky';
    document.getElementById('fMaterial').value = p.material || '';
    document.getElementById('fDesc').value = p.desc || '';
    document.getElementById('fImg').value = p.img || '';
    document.getElementById('fBadge').value = p.badge || '';
    document.getElementById('fStock').value = p.inStock !== false ? 'true' : 'false';
    previewImg();
  } else {
    ['fName','fPrice','fMaterial','fDesc','fImg','fBadge'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fCat').value = 'naramky';
    document.getElementById('fStock').value = 'true';
    document.getElementById('imgPreview').style.display = 'none';
  }

  document.getElementById('productModal').classList.add('open');
};

window.closeModal = () => {
  document.getElementById('productModal').classList.remove('open');
  editingId = null;
};

window.previewImg = () => {
  const url = document.getElementById('fImg').value;
  const img = document.getElementById('imgPreview');
  if (url) { img.src = url; img.style.display = 'block'; }
  else img.style.display = 'none';
};

// ── SAVE ──
window.saveProduct = async () => {
  const name = document.getElementById('fName').value.trim();
  const price = parseInt(document.getElementById('fPrice').value);
  if (!name || !price) { showToast('Vyplň název a cenu!'); return; }

  const data = {
    name,
    price,
    cat: document.getElementById('fCat').value,
    material: document.getElementById('fMaterial').value.trim(),
    desc: document.getElementById('fDesc').value.trim(),
    img: document.getElementById('fImg').value.trim(),
    badge: document.getElementById('fBadge').value.trim(),
    inStock: document.getElementById('fStock').value === 'true',
    updatedAt: new Date().toISOString(),
  };

  try {
    if (editingId) {
      await updateDoc(doc(db, 'products', editingId), data);
      showToast('Produkt upraven! ✓');
    } else {
      data.createdAt = new Date().toISOString();
      await addDoc(collection(db, 'products'), data);
      showToast('Produkt přidán! ✓');
    }
    closeModal();
    loadProducts();
  } catch(e) {
    showToast('Chyba: ' + e.message);
  }
};

// ── DELETE ──
window.deleteProduct = async (id) => {
  if (!confirm('Opravdu smazat tento produkt?')) return;
  try {
    await deleteDoc(doc(db, 'products', id));
    showToast('Produkt smazán.');
    loadProducts();
  } catch(e) {
    showToast('Chyba: ' + e.message);
  }
};

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
window.showToast = showToast;

// Close modal on outside click
document.getElementById('productModal').addEventListener('click', e => {
  if (e.target === document.getElementById('productModal')) closeModal();
});
</script>
</body>
</html>
